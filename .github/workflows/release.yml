name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (for example: 26.4.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    environment: production
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "TAG=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          brew install cocoapods || brew upgrade cocoapods
          export PATH="$(brew --prefix)/bin:$PATH"
          pod install --repo-update

      - name: Resolve release mode
        id: release_mode
        env:
          DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_APP_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          missing=()
          for secret_name in \
            DEVELOPER_ID_CERTIFICATE_BASE64 \
            DEVELOPER_ID_CERTIFICATE_PASSWORD \
            APPLE_TEAM_ID \
            APPLE_ID \
            APPLE_ID_APP_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "apple_signing_enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "apple_signing_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Unsigned release::Missing Apple signing secrets: ${missing[*]}. Building unsigned, unnotarized artifacts that require the documented Gatekeeper bypass."
          fi

          if [ "${#missing[@]}" -eq 0 ] && [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            echo "sparkle_appcast_enabled=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$SPARKLE_PRIVATE_KEY" ]; then
            echo "sparkle_appcast_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Manual-only release::Skipping Sparkle appcast publishing because the build is not Developer ID-signed. Sparkle updates require signed update archives."
          else
            echo "sparkle_appcast_enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Manual-only release::SPARKLE_PRIVATE_KEY is missing or empty. Skipping appcast generation and publishing a manual-download release only."
          fi

      - name: Import signing certificate
        if: steps.release_mode.outputs.apple_signing_enabled == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="${{ runner.temp }}/certificate.p12"
          printf '%s' "$CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"

          KEYCHAIN_PATH="${{ runner.temp }}/signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t agg \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Archive
        run: |
          if [ "${{ steps.release_mode.outputs.apple_signing_enabled }}" = "true" ]; then
            xcodebuild \
              -workspace Clipy.xcworkspace \
              -scheme Clipy \
              -configuration Release \
              -archivePath "${{ runner.temp }}/Clipy.xcarchive" \
              MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
              CURRENT_PROJECT_VERSION="${{ steps.version.outputs.VERSION }}" \
              CODE_SIGN_IDENTITY="Developer ID Application" \
              DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
              CODE_SIGN_STYLE=Manual \
              OTHER_CODE_SIGN_FLAGS="--options runtime" \
              archive
          else
            xcodebuild \
              -workspace Clipy.xcworkspace \
              -scheme Clipy \
              -configuration Release \
              -archivePath "${{ runner.temp }}/Clipy.xcarchive" \
              MARKETING_VERSION="${{ steps.version.outputs.VERSION }}" \
              CURRENT_PROJECT_VERSION="${{ steps.version.outputs.VERSION }}" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY="" \
              archive
          fi

      - name: Export app
        run: |
          mkdir -p "${{ runner.temp }}/export"
          cp -R "${{ runner.temp }}/Clipy.xcarchive/Products/Applications/Clipy.app" \
            "${{ runner.temp }}/export/Clipy.app"

      - name: Re-sign all embedded binaries and app
        if: steps.release_mode.outputs.apple_signing_enabled == 'true'
        run: |
          APP_PATH="${{ runner.temp }}/export/Clipy.app"
          SIGN_ID="Developer ID Application"

          cat > "${{ runner.temp }}/release.entitlements" << 'ENTITLEMENTS'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.app-sandbox</key>
            <false/>
          </dict>
          </plist>
          ENTITLEMENTS

          find "$APP_PATH" -type f -print0 2>/dev/null | while IFS= read -r -d '' file; do
            if file "$file" | grep -q "Mach-O"; then
              codesign --force --options runtime --timestamp \
                --entitlements "${{ runner.temp }}/release.entitlements" \
                --sign "$SIGN_ID" "$file"
            fi
          done

          find "$APP_PATH/Contents/Frameworks" -name "*.app" -type d -print0 2>/dev/null | while IFS= read -r -d '' app; do
            codesign --force --deep --options runtime --timestamp \
              --entitlements "${{ runner.temp }}/release.entitlements" \
              --sign "$SIGN_ID" "$app"
          done

          find "$APP_PATH/Contents/Frameworks" -name "*.framework" -type d -print0 2>/dev/null | while IFS= read -r -d '' framework; do
            codesign --force --deep --options runtime --timestamp \
              --sign "$SIGN_ID" "$framework"
          done

          find "$APP_PATH" -name "*.dylib" -type f -print0 2>/dev/null | while IFS= read -r -d '' dylib; do
            codesign --force --options runtime --timestamp \
              --sign "$SIGN_ID" "$dylib"
          done

          codesign --force --deep --options runtime --timestamp \
            --entitlements "${{ runner.temp }}/release.entitlements" \
            --sign "$SIGN_ID" "$APP_PATH"

      - name: Verify signature
        if: steps.release_mode.outputs.apple_signing_enabled == 'true'
        run: |
          codesign --verify --deep --strict --verbose=2 "${{ runner.temp }}/export/Clipy.app"

      - name: Verify Sparkle update signing prerequisites
        if: steps.release_mode.outputs.sparkle_appcast_enabled == 'true'
        run: |
          APP_PATH="${{ runner.temp }}/export/Clipy.app"
          SIGNING_DETAILS="$(codesign -dvv "$APP_PATH" 2>&1)"
          echo "$SIGNING_DETAILS"

          if echo "$SIGNING_DETAILS" | grep -q '^Signature=adhoc$'; then
            echo "::error title=Invalid Sparkle artifact::Clipy.app is ad-hoc signed. Sparkle updates require a Developer ID-signed app."
            exit 1
          fi

          if echo "$SIGNING_DETAILS" | grep -q '^TeamIdentifier=not set$'; then
            echo "::error title=Invalid Sparkle artifact::Clipy.app is missing a team identifier. Sparkle updates require a Developer ID-signed app."
            exit 1
          fi

      - name: Notarize and staple app
        if: steps.release_mode.outputs.apple_signing_enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="${{ runner.temp }}/export/Clipy.app"
          xcrun notarytool submit "$APP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP_PATH"

      - name: Create Sparkle ZIP
        run: |
          mkdir -p "${{ runner.temp }}/sparkle-artifacts"
          ditto -c -k --sequesterRsrc --keepParent \
            "${{ runner.temp }}/export/Clipy.app" \
            "${{ runner.temp }}/sparkle-artifacts/Clipy-${{ steps.version.outputs.VERSION }}.zip"

      - name: Create DMG
        run: |
          brew install create-dmg || true
          create-dmg \
            --volname "Clipy ${{ steps.version.outputs.VERSION }}" \
            --volicon "${{ runner.temp }}/export/Clipy.app/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Clipy.app" 150 190 \
            --app-drop-link 450 190 \
            --hide-extension "Clipy.app" \
            "${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg" \
            "${{ runner.temp }}/export/" || true

          if [ ! -f "${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg" ]; then
            hdiutil create \
              -volname "Clipy ${{ steps.version.outputs.VERSION }}" \
              -srcfolder "${{ runner.temp }}/export/" \
              -ov -format UDZO \
              "${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg"
          fi

      - name: Sign, notarize, and staple DMG
        if: steps.release_mode.outputs.apple_signing_enabled == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_PATH="${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg"

          codesign --force --timestamp --sign "Developer ID Application" "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      - name: Generate Sparkle appcast
        if: steps.release_mode.outputs.sparkle_appcast_enabled == 'true'
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          printf '%s' "$SPARKLE_PRIVATE_KEY" | ./Pods/Sparkle/bin/generate_appcast \
            --ed-key-file - \
            -o "${{ runner.temp }}/sparkle-artifacts/appcast.xml" \
            --download-url-prefix "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.TAG }}/" \
            "${{ runner.temp }}/sparkle-artifacts"

      - name: Prepare release notes
        run: |
          RELEASE_NOTES_PATH="${{ runner.temp }}/release-notes.md"

          if [ "${{ steps.release_mode.outputs.apple_signing_enabled }}" = "true" ] && [ "${{ steps.release_mode.outputs.sparkle_appcast_enabled }}" = "true" ]; then
            cat > "$RELEASE_NOTES_PATH" <<EOF
          ## Clipy v${{ steps.version.outputs.VERSION }}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ### Install
          1. Download \`Clipy-${{ steps.version.outputs.VERSION }}.dmg\` below
          2. Open the DMG and drag Clipy to Applications
          3. Launch Clipy — it appears in your menu bar

          **Signed, notarized, and Sparkle-enabled.** Requires macOS 14.0 Sonoma or later.
          EOF
          elif [ "${{ steps.release_mode.outputs.sparkle_appcast_enabled }}" = "true" ]; then
            cat > "$RELEASE_NOTES_PATH" <<EOF
          ## Clipy v${{ steps.version.outputs.VERSION }}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ### Install
          1. Download \`Clipy-${{ steps.version.outputs.VERSION }}.dmg\` below
          2. Open the DMG and drag Clipy to Applications
          3. If macOS blocks the app on first launch, open \`Applications\`, Control-click \`Clipy.app\`, then choose \`Open\`
          4. If needed, go to \`System Settings\` -> \`Privacy & Security\` and click \`Open Anyway\`

          **Unsigned, unnotarized manual release.** This build uses the documented Gatekeeper bypass flow on first launch. Automatic updates are disabled until Developer ID signing and notarization are configured.
          EOF
          else
            cat > "$RELEASE_NOTES_PATH" <<EOF
          ## Clipy v${{ steps.version.outputs.VERSION }}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

          ### Install
          1. Download \`Clipy-${{ steps.version.outputs.VERSION }}.dmg\` below
          2. Open the DMG and drag Clipy to Applications
          3. If macOS blocks the app on first launch, open \`Applications\`, Control-click \`Clipy.app\`, then choose \`Open\`
          4. If needed, go to \`System Settings\` -> \`Privacy & Security\` and click \`Open Anyway\`

          **Unsigned, unnotarized manual release.** This build uses the documented Gatekeeper bypass flow on first launch. Automatic updates are unavailable until \`SPARKLE_PRIVATE_KEY\` is configured and appcast publishing is re-enabled.
          EOF
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Clipy v${{ steps.version.outputs.VERSION }}
          body_path: ${{ runner.temp }}/release-notes.md
          files: |
            ${{ runner.temp }}/Clipy-${{ steps.version.outputs.VERSION }}.dmg
            ${{ runner.temp }}/sparkle-artifacts/Clipy-${{ steps.version.outputs.VERSION }}.zip
          draft: false
          prerelease: false

      - name: Publish appcast to docs
        if: steps.release_mode.outputs.sparkle_appcast_enabled == 'true'
        run: |
          git fetch origin main
          git switch -C release-docs origin/main
          cp "${{ runner.temp }}/sparkle-artifacts/appcast.xml" docs/appcast.xml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- docs/appcast.xml; then
            echo "Appcast already up to date"
            exit 0
          fi

          git add docs/appcast.xml
          git commit -m "chore(release): update Sparkle appcast for ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "${{ runner.temp }}/signing.keychain-db" 2>/dev/null || true
