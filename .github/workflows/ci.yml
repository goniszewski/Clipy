name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  WORKSPACE: Clipy.xcworkspace
  SCHEME: Clipy
  DESTINATION: platform=macOS,arch=arm64

jobs:
  lint-generation:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          brew install cocoapods || brew upgrade cocoapods
          export PATH="$(brew --prefix)/bin:$PATH"
          pod install

      - name: Run SwiftLint
        run: ./scripts/run-swiftlint.sh

      - name: Regenerate SwiftGen outputs
        run: ./scripts/run-swiftgen.sh

      - name: Verify generated files are committed
        run: git diff --exit-code -- Clipy/Generated

  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          brew install cocoapods || brew upgrade cocoapods
          export PATH="$(brew --prefix)/bin:$PATH"
          pod install

      - name: Prepare generated sources
        run: ./scripts/run-swiftgen.sh

      - name: Build
        run: |
          xcodebuild \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -configuration Debug \
            -destination "${DESTINATION}" \
            -derivedDataPath "$RUNNER_TEMP/clipy-build-derived-data" \
            -resultBundlePath "$RUNNER_TEMP/clipy-build.xcresult" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Upload build result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clipy-build-xcresult
          path: ${{ runner.temp }}/clipy-build.xcresult
          if-no-files-found: ignore

  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        run: |
          brew install cocoapods || brew upgrade cocoapods
          export PATH="$(brew --prefix)/bin:$PATH"
          pod install

      - name: Prepare generated sources
        run: ./scripts/run-swiftgen.sh

      - name: Test
        run: |
          xcodebuild \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -configuration Debug \
            -destination "${DESTINATION}" \
            -derivedDataPath "$RUNNER_TEMP/clipy-test-derived-data" \
            -resultBundlePath "$RUNNER_TEMP/clipy-tests.xcresult" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            test

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clipy-test-xcresult
          path: ${{ runner.temp }}/clipy-tests.xcresult
          if-no-files-found: ignore
